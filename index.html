<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪨 Pet Rock - Maria's Game!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      color: #e75480;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 10px;
      font-size: 2.5em;
    }
    .rock-container {
      background: rgba(255,255,255,0.8);
      border-radius: 30px;
      padding: 30px;
      margin: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }
    .rock {
      font-size: 120px;
      margin: 20px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .rock:hover {
      transform: scale(1.2);
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .rock.happy {
      animation: spin 0.5s ease-in-out;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .stat {
      background: white;
      padding: 15px 25px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .stat-label {
      font-size: 0.9em;
      color: #888;
    }
    .stat-value {
      font-size: 1.5em;
      font-weight: bold;
      color: #e75480;
    }
    .bar-container {
      width: 100px;
      height: 15px;
      background: #ddd;
      border-radius: 10px;
      margin-top: 5px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
      border-radius: 10px;
      transition: width 0.5s;
    }
    .buttons {
      display: flex;
      gap: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      font-family: 'Comic Sans MS', cursive;
      font-size: 1.2em;
      padding: 15px 30px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    button:active {
      transform: translateY(0);
    }
    .feed { background: linear-gradient(135deg, #a8e063, #56ab2f); color: white; }
    .play { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .clean { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
    .sleep { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    
    .message {
      font-size: 1.3em;
      color: #e75480;
      margin: 15px 0;
      min-height: 30px;
    }
    .level {
      font-size: 1.5em;
      color: #9b59b6;
      margin: 10px 0;
    }
    .name-input {
      font-size: 1.2em;
      padding: 10px 20px;
      border: 3px solid #e75480;
      border-radius: 20px;
      text-align: center;
      margin: 10px;
    }
    .name-display {
      font-size: 1.8em;
      color: #9b59b6;
      margin: 10px 0;
    }
    .hearts {
      font-size: 1.5em;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🪨 Pet Rock 🪨</h1>
  
  <div class="rock-container">
    <div id="setup">
      <p>What's your rock's name?</p>
      <input type="text" class="name-input" id="rockName" placeholder="Type name here..." maxlength="15">
      <br><br>
      <button class="feed" onclick="startGame()">Start! 🎉</button>
    </div>
    
    <div id="game" style="display:none;">
      <div class="name-display" id="nameDisplay">Rocky</div>
      <div class="hearts" id="hearts">💕💕💕💕💕</div>
      <div class="rock" id="rock" onclick="petRock()">🪨</div>
      <div class="message" id="message">Hi! I'm happy to meet you!</div>
      <div class="level">Level: <span id="level">1</span> ⭐</div>
      
      <div class="stats">
        <div class="stat">
          <div class="stat-label">🍎 Hunger</div>
          <div class="bar-container"><div class="bar" id="hungerBar" style="width:100%"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">🎮 Happiness</div>
          <div class="bar-container"><div class="bar" id="happyBar" style="width:100%"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">✨ Clean</div>
          <div class="bar-container"><div class="bar" id="cleanBar" style="width:100%"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">💤 Energy</div>
          <div class="bar-container"><div class="bar" id="energyBar" style="width:100%"></div></div>
        </div>
      </div>
      
      <div class="buttons">
        <button class="feed" onclick="feed()">🍎 Feed</button>
        <button class="play" onclick="play()">🎮 Play</button>
        <button class="clean" onclick="clean()">✨ Clean</button>
        <button class="sleep" onclick="sleep()">💤 Sleep</button>
      </div>
      <div class="buttons">
        <button id="musicBtn" onclick="startMusic()" style="background: linear-gradient(135deg, #ff9a9e, #fecfef); color: white;">🎵 Music OFF</button>
        <button id="melodyBtn" onclick="changeMelody()" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: white;">🎶 HAPPY</button>
      </div>
      <div class="buttons">
        <button onclick="slowDown()" style="background: linear-gradient(135deg, #84fab0, #8fd3f4); color: white;">🐢 Slower</button>
        <span id="speedDisplay" style="padding: 10px; font-size: 1.2em; color: #e75480;">Speed: 1.0x</span>
        <button onclick="speedUp()" style="background: linear-gradient(135deg, #fa709a, #fee140); color: white;">🐰 Faster</button>
      </div>
      <div class="buttons">
        <button onclick="volumeDown()" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white;">🔉 Quieter</button>
        <span id="volumeDisplay" style="padding: 10px; font-size: 1.2em; color: #9b59b6;">🔊 50%</span>
        <button onclick="volumeUp()" style="background: linear-gradient(135deg, #f093fb, #f5576c); color: white;">🔊 Louder</button>
      </div>
    </div>
  </div>
  
  <script>
    // Fun sounds and music!
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicPlaying = false;
    let musicInterval;
    
    // Background music melodies
    const melodies = {
      happy: [262, 294, 330, 349, 392, 440, 494, 523, 494, 440, 392, 349, 330, 294, 262, 294],
      twinkle: [262, 262, 392, 392, 440, 440, 392, 349, 349, 330, 330, 294, 294, 262],
      lullaby: [330, 349, 392, 440, 392, 349, 330, 294, 330, 349, 392, 440, 392, 349, 330],
      fun: [523, 494, 440, 392, 349, 330, 294, 262, 294, 330, 349, 392, 440, 494, 523]
    };
    const melodyNames = ['happy', 'twinkle', 'lullaby', 'fun'];
    let currentMelody = 0;
    let noteIndex = 0;
    let musicSpeed = 400;
    let musicVolume = 0.05;
    
    function playNote(freq) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(musicVolume, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      osc.stop(audioCtx.currentTime + 0.35);
    }
    
    function startMusic() {
      if (!musicPlaying) {
        audioCtx.resume();
        musicPlaying = true;
        musicInterval = setInterval(() => {
          const melody = melodies[melodyNames[currentMelody]];
          playNote(melody[noteIndex]);
          noteIndex = (noteIndex + 1) % melody.length;
        }, musicSpeed);
        document.getElementById('musicBtn').textContent = '🎵 Music ON';
      } else {
        stopMusic();
      }
    }
    
    function stopMusic() {
      musicPlaying = false;
      clearInterval(musicInterval);
      document.getElementById('musicBtn').textContent = '🎵 Music OFF';
    }
    
    function changeMelody() {
      currentMelody = (currentMelody + 1) % melodyNames.length;
      document.getElementById('melodyBtn').textContent = '🎶 ' + melodyNames[currentMelody].toUpperCase();
      noteIndex = 0;
      if (musicPlaying) {
        clearInterval(musicInterval);
        const melody = melodies[melodyNames[currentMelody]];
        musicInterval = setInterval(() => {
          playNote(melody[noteIndex]);
          noteIndex = (noteIndex + 1) % melody.length;
        }, musicSpeed);
      }
    }
    
    function speedUp() {
      musicSpeed = Math.max(100, musicSpeed - 50);
      document.getElementById('speedDisplay').textContent = 'Speed: ' + (400 / musicSpeed).toFixed(1) + 'x';
      noteIndex = 0;
      if (musicPlaying) {
        clearInterval(musicInterval);
        const melody = melodies[melodyNames[currentMelody]];
        musicInterval = setInterval(() => {
          playNote(melody[noteIndex]);
          noteIndex = (noteIndex + 1) % melody.length;
        }, musicSpeed);
      }
    }
    
    function slowDown() {
      musicSpeed = Math.min(800, musicSpeed + 50);
      document.getElementById('speedDisplay').textContent = 'Speed: ' + (400 / musicSpeed).toFixed(1) + 'x';
      noteIndex = 0;
      if (musicPlaying) {
        clearInterval(musicInterval);
        const melody = melodies[melodyNames[currentMelody]];
        musicInterval = setInterval(() => {
          playNote(melody[noteIndex]);
          noteIndex = (noteIndex + 1) % melody.length;
        }, musicSpeed);
      }
    }
    
    function volumeUp() {
      musicVolume = Math.min(0.2, musicVolume + 0.02);
      document.getElementById('volumeDisplay').textContent = '🔊 ' + Math.round(musicVolume * 500) + '%';
    }
    
    function volumeDown() {
      musicVolume = Math.max(0.01, musicVolume - 0.02);
      document.getElementById('volumeDisplay').textContent = '🔊 ' + Math.round(musicVolume * 500) + '%';
    }
    
    function playSound(freq, duration, type = 'sine') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = 0.1;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.stop(audioCtx.currentTime + duration);
    }
    
    function happySound() {
      playSound(523, 0.1);
      setTimeout(() => playSound(659, 0.1), 100);
      setTimeout(() => playSound(784, 0.2), 200);
    }
    
    function clickSound() {
      playSound(440, 0.1);
    }
    let rock = {
      name: 'Rocky',
      hunger: 100,
      happiness: 100,
      clean: 100,
      energy: 100,
      level: 1,
      xp: 0
    };
    
    const messages = {
      happy: ['I love you! 💕', 'Yay! So fun!', 'Best day ever!', 'You\'re the best!', '*happy rock noises*'],
      hungry: ['I\'m hungry...', 'Food please? 🍎', 'My tummy grumbles...'],
      tired: ['So sleepy... 😴', 'Can we rest?', '*yawn*'],
      dirty: ['I need a bath!', 'Ew, dirty!', 'Clean me please?'],
      sad: ['I\'m sad...', 'Play with me?', '*lonely rock*']
    };
    
    function startGame() {
      const name = document.getElementById('rockName').value.trim();
      if (name) {
        rock.name = name;
      }
      document.getElementById('nameDisplay').textContent = rock.name;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      saveGame();
      gameLoop();
    }
    
    function updateDisplay() {
      document.getElementById('hungerBar').style.width = rock.hunger + '%';
      document.getElementById('happyBar').style.width = rock.happiness + '%';
      document.getElementById('cleanBar').style.width = rock.clean + '%';
      document.getElementById('energyBar').style.width = rock.energy + '%';
      document.getElementById('level').textContent = rock.level;
      
      let hearts = Math.floor((rock.happiness + rock.hunger + rock.clean + rock.energy) / 80);
      document.getElementById('hearts').textContent = '💕'.repeat(Math.min(5, hearts));
      
      // Rock always stays a rock!
      document.getElementById('rock').textContent = '🪨';
    }
    
    function showMessage(type) {
      const msgs = messages[type];
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      document.getElementById('message').textContent = msg;
    }
    
    function feed() {
      clickSound();
      if (rock.hunger < 100) {
        rock.hunger = Math.min(100, rock.hunger + 25);
        rock.energy = Math.min(100, rock.energy + 10);
        showMessage('happy');
        addXP(5);
        animateRock();
        happySound();
        updateDisplay();
        saveGame();
      } else {
        document.getElementById('message').textContent = 'I\'m full! 😊';
      }
    }
    
    function play() {
      clickSound();
      if (rock.energy >= 20) {
        rock.happiness = Math.min(100, rock.happiness + 30);
        rock.energy = Math.max(0, rock.energy - 20);
        rock.clean = Math.max(0, rock.clean - 10);
        showMessage('happy');
        addXP(10);
        animateRock();
        happySound();
        updateDisplay();
        saveGame();
      } else {
        document.getElementById('message').textContent = 'Too tired to play... 😴';
      }
    }
    
    function clean() {
      clickSound();
      rock.clean = 100;
      rock.happiness = Math.min(100, rock.happiness + 15);
      showMessage('happy');
      addXP(5);
      animateRock();
      happySound();
      updateDisplay();
      saveGame();
    }
    
    function sleep() {
      clickSound();
      rock.energy = 100;
      rock.hunger = Math.max(0, rock.hunger - 20);
      showMessage('happy');
      addXP(5);
      document.getElementById('message').textContent = 'Zzz... 😴✨ Good nap!';
      happySound();
      updateDisplay();
      saveGame();
    }
    
    function petRock() {
      clickSound();
      rock.happiness = Math.min(100, rock.happiness + 5);
      showMessage('happy');
      addXP(2);
      animateRock();
      updateDisplay();
      saveGame();
    }
    
    function animateRock() {
      const rockEl = document.getElementById('rock');
      rockEl.classList.add('happy');
      setTimeout(() => rockEl.classList.remove('happy'), 500);
    }
    
    function addXP(amount) {
      rock.xp += amount;
      if (rock.xp >= rock.level * 50) {
        rock.level++;
        rock.xp = 0;
        document.getElementById('message').textContent = '🎉 LEVEL UP! Level ' + rock.level + '! 🎉';
      }
    }
    
    function gameLoop() {
      setInterval(() => {
        rock.hunger = Math.max(0, rock.hunger - 2);
        rock.happiness = Math.max(0, rock.happiness - 1);
        rock.clean = Math.max(0, rock.clean - 1);
        rock.energy = Math.max(0, rock.energy - 1);
        
        if (rock.hunger < 30) showMessage('hungry');
        else if (rock.energy < 30) showMessage('tired');
        else if (rock.clean < 30) showMessage('dirty');
        else if (rock.happiness < 30) showMessage('sad');
        
        updateDisplay();
        saveGame();
      }, 5000);
    }
    
    function saveGame() {
      localStorage.setItem('petRock', JSON.stringify(rock));
    }
    
    function loadGame() {
      const saved = localStorage.getItem('petRock');
      if (saved) {
        rock = JSON.parse(saved);
        document.getElementById('nameDisplay').textContent = rock.name;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        updateDisplay();
        gameLoop();
      }
    }
    
    loadGame();
  </script>
</body>
</html>
